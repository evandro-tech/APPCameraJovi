<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0" />
  <title>JOVI Camera</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="phone">

    <div id="camera-app" class="camera-app">

      <!-- ===== TOP BAR ===== -->
      <div class="top-bar">

        <div class="icon-flash" id="btn-flash">
          <svg width="16" height="22" viewBox="0 0 16 22">
            <polyline points="10,1 3,12 8,12 6,21 13,10 8,10 10,1" stroke="white" stroke-width="1.6" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
            <line id="flash-strike" x1="2" y1="2" x2="14" y2="20" stroke="white" stroke-width="1.6" stroke-linecap="round" style="display:none;"/>
          </svg>
        </div>

        <div class="icon-timer" id="btn-timer">
          <svg width="24" height="24" viewBox="0 0 22 22">
            <circle cx="11" cy="12" r="8" stroke="white" stroke-width="1.6"/>
            <line x1="11" y1="8" x2="11" y2="12" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
            <line x1="11" y1="12" x2="14" y2="14" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
            <line x1="6" y1="3" x2="3" y2="6" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
            <line x1="16" y1="3" x2="19" y2="6" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
            <line id="timer-strike" x1="4" y1="4" x2="18" y2="18" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          <span id="timer-label" class="timer-text"></span>
        </div>

        <div class="mode-pill" id="top-mode-pill">Foto</div>

        <div class="ratio" id="btn-ratio">3:4</div>

        <div class="icon-grid" id="btn-settings">
          <svg width="20" height="20" viewBox="0 0 20 20">
            <rect x="1"  y="1"  width="7" height="7" rx="1.5" stroke="white" stroke-width="1.5" fill="none"/>
            <rect x="12" y="1"  width="7" height="7" rx="1.5" stroke="white" stroke-width="1.5" fill="none"/>
            <rect x="1"  y="12" width="7" height="7" rx="1.5" stroke="white" stroke-width="1.5" fill="none"/>
            <rect x="12" y="12" width="7" height="7" rx="1.5" stroke="white" stroke-width="1.5" fill="none"/>
          </svg>
        </div>

      </div><!-- /top-bar -->


      <!-- ===== VIEWFINDER ===== -->
      <div class="viewfinder">

        <div class="focus-box" id="focus-box">
          <span class="focus-corner-bl"></span>
          <span class="focus-corner-br"></span>
        </div>

        <div class="focus-box-student" id="focus-box-student" style="display:none;"></div>

        <div class="pano-guide" id="pano-guide" style="display:none;">
          <div class="pano-line"></div>
          <div class="pano-arrow"></div>
        </div>

        <div class="student-actions" id="student-actions" style="display:none;">
          <button class="student-btn">Resumir</button>
          <button class="student-btn">Anotar</button>
          <button class="student-btn">Exportar</button>
        </div>

        <div class="brightness-track" id="brightness-track">
          <div class="brightness-fill" id="brightness-fill"></div>
          <div class="brightness-thumb" id="brightness-thumb"></div>
        </div>

        <div class="zoom-selector">
          <button class="zoom-btn">.5</button>
          <button class="zoom-btn active">1</button>
          <button class="zoom-btn">2</button>
          <button class="zoom-btn">3</button>
        </div>

        <div id="recording-indicator" class="recording-indicator">
          <div class="red-dot"></div>
          <span id="recording-timer">00:00</span>
        </div>

      </div><!-- /viewfinder -->


      <!-- ===== CONTROLES INFERIORES ===== -->
      <div class="bottom-controls">

        <div class="controls-row">

          <button class="btn-gallery" aria-label="Galeria"></button>

          <div class="shutter-wrapper">
            <div class="shutter-ring"></div>
            <button class="shutter-btn" id="shutter-btn" aria-label="Tirar foto"></button>
          </div>

          <button class="btn-flip" aria-label="Virar câmera">
            <svg width="22" height="18" viewBox="0 0 22 18">
              <path d="M2 9 C2 4.6 5.6 1 10 1 L18 1" stroke-linecap="round" stroke-linejoin="round"/>
              <polyline points="15,1 18,1 18,4" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M20 9 C20 13.4 16.4 17 12 17 L4 17" stroke-linecap="round" stroke-linejoin="round"/>
              <polyline points="7,17 4,17 4,14" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>

        </div><!-- /controls-row -->

        <!-- Barra de modos — itens gerados pelo Carousel.js -->
        <div class="mode-bar-container">
          <div class="mode-bar" id="mode-bar"></div>
        </div>

      </div><!-- /bottom-controls -->

      <!-- More Modes Overlay -->
      <div id="more-modes-overlay" class="more-modes-container">
        <div class="more-modes-title">Adicionar modos</div>
        <div class="more-modes-grid">
          <div class="mode-chip">Comida</div>
          <div class="mode-chip">Alta Resolução</div>
          <div class="mode-chip">Microfilme</div>
          <div class="mode-chip">Câmera Lenta</div>
          <div class="mode-chip">Astro</div>
          <div class="mode-chip">Intervalo</div>
          <div class="mode-chip">Instantâneo</div>
          <div class="mode-chip">Visualização Dupla</div>
          <div class="mode-chip">Superlua</div>
          <div class="mode-chip">Foto em movimento</div>
        </div>
      </div>

      <!-- Flash Overlay -->
      <div id="flash-overlay" class="flash-overlay"></div>

      <!-- Gallery Thumbnail Animation -->
      <div id="shutter-thumbnail" class="shutter-thumbnail"></div>

    </div><!-- /camera-app -->
  </div><!-- /phone -->

  <script src="js/GlobalState.js"></script>
  <script src="js/components/Navigation.js"></script>
  <script src="js/components/CameraControls.js"></script>
  <script src="js/components/ViewfinderInteractions.js"></script>
  <script src="js/components/Shutter.js"></script>
  <script src="js/components/Carousel.js"></script>
</body>
</html>
