<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0" />
  <title>JOVI Camera</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="phone">

    <!-- ===== START SCREEN ===== -->
    <div id="start-screen" class="start-screen">
      <div class="logo-container">
        <div class="circle outer">
          <div class="circle middle">
            <div class="circle inner">
              <div class="dot"></div>
            </div>
          </div>
        </div>
        <h1 class="logo-title">JOVI</h1>
        <p class="logo-subtitle">Camera</p>
      </div>
      <button id="btn-open-camera" class="btn-open-camera">Abrir câmera</button>
    </div>

    <!-- ===== CAMERA APP (hidden initially) ===== -->
    <div id="camera-app" class="camera-app" style="display: none;">
      <!-- ===== TOP BAR ===== -->
      <div class="top-bar">

      <!-- Ícone: Flash -->
      <div class="icon-flash">
        <svg width="16" height="22" viewBox="0 0 16 22">
          <polyline points="10,1 3,12 8,12 6,21 13,10 8,10 10,1" stroke="white" stroke-width="1.6" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
        </svg>
      </div>

      <!-- Ícone: Temporizador (despertador) -->
      <div class="icon-timer" id="btn-timer">
        <svg width="22" height="22" viewBox="0 0 22 22">
          <circle cx="11" cy="12" r="8" stroke="white" stroke-width="1.6"/>
          <line x1="11" y1="8" x2="11" y2="12" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
          <line x1="11" y1="12" x2="14" y2="14" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
          <!-- Alças do despertador -->
          <line x1="6" y1="3" x2="3" y2="6" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
          <line x1="16" y1="3" x2="19" y2="6" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
          <!-- Traço de cancelamento (timer desativado - escondido por padrão) -->
          <line class="strike" x1="4" y1="4" x2="18" y2="18" stroke="white" stroke-width="1.6" stroke-linecap="round" style="display: none;"/>
        </svg>
      </div>

      <!-- Pill: modo atual -->
      <div class="mode-pill" id="top-mode-pill">Foto</div>

      <!-- Proporção -->
      <div class="ratio" id="btn-ratio">3:4</div>

      <!-- Ícone: Grade -->
      <div class="icon-grid" id="btn-settings">
        <svg width="20" height="20" viewBox="0 0 20 20">
          <!-- Grade 2x2 de quadradinhos -->
          <rect x="1"  y="1"  width="7" height="7" rx="1.5" stroke="white" stroke-width="1.5"/>
          <rect x="12" y="1"  width="7" height="7" rx="1.5" stroke="white" stroke-width="1.5"/>
          <rect x="1"  y="12" width="7" height="7" rx="1.5" stroke="white" stroke-width="1.5"/>
          <rect x="12" y="12" width="7" height="7" rx="1.5" stroke="white" stroke-width="1.5"/>
        </svg>
      </div>

      <!-- Settings Dropdown -->
      <div id="settings-dropdown" class="settings-dropdown" style="display: none;">
        <div class="settings-title">Adicionar mais modos</div>
        <div class="settings-options">
          <div class="settings-option">Comida</div>
          <div class="settings-option">Superlua</div>
          <div class="settings-option">Câmera Lenta</div>
        </div>
      </div>

    </div><!-- /top-bar -->


    <!-- ===== VIEWFINDER ===== -->
    <div class="viewfinder">

      <!-- Quadro de foco laranja -->
      <div class="focus-box" id="focus-box">
        <span class="focus-corner-bl"></span>
        <span class="focus-corner-br"></span>
      </div>

      <!-- Quadro de foco Estudante (Azul) -->
      <div class="focus-box-student" id="focus-box-student" style="display: none;"></div>

      <!-- Guia Panorâmica -->
      <div class="pano-guide" id="pano-guide" style="display: none;">
        <div class="pano-line"></div>
        <div class="pano-arrow"></div>
      </div>

      <!-- Botões de Estudante -->
      <div class="student-actions" id="student-actions" style="display: none;">
        <button class="student-btn">Resumir</button>
        <button class="student-btn">Anotar</button>
        <button class="student-btn">Exportar</button>
      </div>

      <!-- Slider de brilho vertical -->
      <div class="brightness-track">
        <div class="brightness-fill"></div>
        <div class="brightness-thumb"></div>
      </div>

      <!-- Seletor de zoom -->
      <div class="zoom-selector">
        <button class="zoom-btn">.5</button>
        <button class="zoom-btn active">1</button>
        <button class="zoom-btn">2</button>
        <button class="zoom-btn">3</button>
      </div>

    </div><!-- /viewfinder -->


    <!-- ===== CONTROLES INFERIORES ===== -->
    <div class="bottom-controls">

      <!-- Linha principal: galeria + shutter + virar -->
      <div class="controls-row">

        <!-- Galeria -->
        <button class="btn-gallery" aria-label="Galeria"></button>

        <!-- Shutter -->
        <div class="shutter-wrapper">
          <div class="shutter-ring"></div>
          <button class="shutter-btn" id="shutter-btn" aria-label="Tirar foto"></button>
        </div>

        <!-- Virar câmera -->
        <button class="btn-flip" aria-label="Virar câmera">
          <svg width="22" height="18" viewBox="0 0 22 18">
            <!-- Seta circular estilizada -->
            <path d="M2 9 C2 4.6 5.6 1 10 1 L18 1" stroke-linecap="round" stroke-linejoin="round"/>
            <polyline points="15,1 18,1 18,4" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M20 9 C20 13.4 16.4 17 12 17 L4 17" stroke-linecap="round" stroke-linejoin="round"/>
            <polyline points="7,17 4,17 4,14" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>

      </div><!-- /controls-row -->

      <!-- Barra de modos -->
      <div class="mode-bar-container">
        <div class="mode-bar" id="mode-bar">
          <span class="mode-item" data-mode="Pro">Pro</span>
          <span class="mode-item" data-mode="Panorâmica">Panorâmica</span>
          <span class="mode-item" data-mode="Noite">Noite</span>
          <span class="mode-item" data-mode="Documento">Documento</span>
          <span class="mode-item" data-mode="Vídeo">Vídeo</span>
          <span class="mode-item active" data-mode="Foto">Foto</span>
          <span class="mode-item" data-mode="Retrato">Retrato</span>
          <span class="mode-item" data-mode="Estudante">Estudante</span>
        </div>
      </div>

    </div><!-- /bottom-controls -->

    </div><!-- /camera-app -->
  </div><!-- /phone -->

  <script>
    // Navegação Start -> Camera
    document.getElementById('btn-open-camera').addEventListener('click', () => {
      document.getElementById('start-screen').style.display = 'none';
      document.getElementById('camera-app').style.display = 'flex';
      document.getElementById('camera-app').style.flexDirection = 'column';
      document.getElementById('camera-app').style.height = '100%';
    });

    // Top Bar Actions
    const iconFlash = document.querySelector('.icon-flash');
    iconFlash.addEventListener('click', () => {
      iconFlash.classList.toggle('active-state');
    });

    const iconTimer = document.getElementById('btn-timer');
    const timerStrike = iconTimer.querySelector('.strike');
    iconTimer.addEventListener('click', () => {
      if (timerStrike.style.display === 'none') {
        timerStrike.style.display = 'block';
      } else {
        timerStrike.style.display = 'none';
      }
    });

    const btnRatio = document.getElementById('btn-ratio');
    btnRatio.addEventListener('click', () => {
      btnRatio.innerText = btnRatio.innerText === '3:4' ? '9:16' : '3:4';
    });

    const btnSettings = document.getElementById('btn-settings');
    const settingsDropdown = document.getElementById('settings-dropdown');
    btnSettings.addEventListener('click', () => {
      settingsDropdown.style.display = settingsDropdown.style.display === 'none' ? 'flex' : 'none';
    });

    // Zoom Levels
    const zoomBtns = document.querySelectorAll('.zoom-btn');
    zoomBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        zoomBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });

    // Mode Bar
    const modeItems = document.querySelectorAll('.mode-item');
    const shutterBtn = document.getElementById('shutter-btn');
    const topModePill = document.getElementById('top-mode-pill');
    const focusBox = document.getElementById('focus-box');
    const focusBoxStudent = document.getElementById('focus-box-student');
    const panoGuide = document.getElementById('pano-guide');
    const studentActions = document.getElementById('student-actions');
    const modeBar = document.getElementById('mode-bar');

    modeItems.forEach(item => {
      item.addEventListener('click', () => {
        // Remove active class from all
        modeItems.forEach(i => i.classList.remove('active'));
        // Add active class to clicked
        item.classList.add('active');
        
        const mode = item.getAttribute('data-mode');
        topModePill.innerText = mode;

        // Reset UI
        shutterBtn.style.backgroundColor = '#e2e2e2';
        focusBox.style.display = 'block';
        focusBox.style.borderColor = 'rgba(242, 173, 31, 0.9)'; // yellow
        focusBox.classList.remove('doc-mode');
        focusBoxStudent.style.display = 'none';
        panoGuide.style.display = 'none';
        studentActions.style.display = 'none';

        if (mode === 'Vídeo') {
          shutterBtn.style.backgroundColor = '#ff3b30'; // red
        } else if (mode === 'Estudante') {
          focusBox.style.display = 'none';
          focusBoxStudent.style.display = 'block';
          studentActions.style.display = 'flex';
        } else if (mode === 'Panorâmica') {
          focusBox.style.display = 'none';
          panoGuide.style.display = 'flex';
        } else if (mode === 'Documento') {
          focusBox.classList.add('doc-mode');
        }

        // Center the active item
        item.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
      });
    });
  </script>
</body>
</html>
